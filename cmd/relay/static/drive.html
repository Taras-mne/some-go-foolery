<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claudy Drive</title>
<link rel="icon" href="logo-icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0e0e0f;
    --surface: #161616;
    --input: #1a1a1a;
    --accent: #e8474a;
    --accent-hover: #d63c3f;
    --text: #e0e0e0;
    --muted: #6e6e6e;
    --dim: #3a3a3a;
    --white: #ffffff;
    --radius: 8px;
    --radius-sm: 6px;
  }

  body {
    font-family: 'Geist', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Login ── */
  .login-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  .login-card {
    background: var(--surface);
    border: 1px solid var(--dim);
    border-radius: 12px;
    padding: 40px;
    width: 100%;
    max-width: 380px;
  }
  .login-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
  }
  .login-logo img { width: 32px; height: 32px; }
  .login-logo span {
    font-family: 'Geist Mono', monospace;
    font-weight: 500;
    font-size: 16px;
    letter-spacing: 0.02em;
  }
  .login-card h2 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .login-card p {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 24px;
  }
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    padding: 10px 12px;
    background: var(--input);
    border: 1px solid var(--dim);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'Geist', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus { border-color: var(--accent); }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 20px;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Geist', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .btn-primary {
    background: var(--accent);
    color: var(--white);
    width: 100%;
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-ghost {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--dim);
    padding: 7px 14px;
  }
  .btn-ghost:hover { border-color: var(--muted); }

  .btn-icon {
    background: transparent;
    color: var(--muted);
    border: none;
    padding: 6px;
    border-radius: var(--radius-sm);
    cursor: pointer;
  }
  .btn-icon:hover { color: var(--text); background: var(--input); }

  .login-error {
    color: var(--accent);
    font-size: 13px;
    margin-bottom: 12px;
    display: none;
  }
  .login-server {
    margin-top: 16px;
    text-align: center;
  }
  .login-server a {
    font-size: 12px;
    color: var(--muted);
    text-decoration: none;
    cursor: pointer;
  }
  .login-server a:hover { color: var(--text); }

  /* ── App layout ── */
  .app { display: none; flex-direction: column; height: 100vh; }

  /* Topbar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 56px;
    border-bottom: 1px solid var(--dim);
    flex-shrink: 0;
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .topbar-left img { width: 24px; height: 24px; }
  .topbar-left span {
    font-family: 'Geist Mono', monospace;
    font-weight: 500;
    font-size: 14px;
  }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .topbar-user {
    font-size: 13px;
    color: var(--muted);
    font-family: 'Geist Mono', monospace;
  }

  /* Toolbar */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    border-bottom: 1px solid var(--dim);
    flex-shrink: 0;
  }
  .breadcrumb { display: flex; align-items: center; gap: 4px; }
  .breadcrumb a, .breadcrumb span {
    font-size: 13px;
    color: var(--muted);
    text-decoration: none;
    cursor: pointer;
  }
  .breadcrumb a:hover { color: var(--text); }
  .breadcrumb span.current { color: var(--text); cursor: default; }
  .breadcrumb .sep { color: var(--dim); margin: 0 2px; user-select: none; }

  .toolbar-actions { display: flex; gap: 8px; }

  /* File list */
  .file-area {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }
  .file-table {
    width: 100%;
    border-collapse: collapse;
  }
  .file-table thead th {
    position: sticky;
    top: 0;
    background: var(--bg);
    text-align: left;
    padding: 10px 24px;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border-bottom: 1px solid var(--dim);
    user-select: none;
  }
  .file-table thead th:last-child { text-align: right; }
  .file-table tbody tr {
    cursor: pointer;
    transition: background 0.1s;
  }
  .file-table tbody tr:hover { background: var(--surface); }
  .file-table tbody td {
    padding: 10px 24px;
    font-size: 13px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    white-space: nowrap;
  }
  .file-table tbody td:last-child {
    text-align: right;
    color: var(--muted);
  }
  .file-table .col-size {
    color: var(--muted);
    font-family: 'Geist Mono', monospace;
    font-size: 12px;
  }
  .file-table .col-date {
    color: var(--muted);
    font-size: 12px;
  }
  .file-name {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .file-icon { width: 18px; height: 18px; flex-shrink: 0; color: var(--muted); }
  .file-icon.folder { color: var(--accent); }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.3; }
  .empty-state p { font-size: 14px; }

  /* Drop zone overlay */
  .drop-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(232, 71, 74, 0.08);
    border: 2px dashed var(--accent);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .drop-overlay.active { display: flex; }
  .drop-overlay p {
    font-size: 18px;
    color: var(--accent);
    font-weight: 500;
  }

  /* Context menu */
  .ctx-menu {
    display: none;
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--dim);
    border-radius: var(--radius-sm);
    padding: 4px 0;
    min-width: 160px;
    z-index: 200;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .ctx-menu.show { display: block; }
  .ctx-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
    color: var(--text);
  }
  .ctx-item:hover { background: var(--input); }
  .ctx-item svg { width: 14px; height: 14px; color: var(--muted); }
  .ctx-item.danger { color: var(--accent); }
  .ctx-item.danger svg { color: var(--accent); }
  .ctx-sep { height: 1px; background: var(--dim); margin: 4px 0; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 300;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--dim);
    border-radius: 12px;
    padding: 28px;
    width: 100%;
    max-width: 360px;
  }
  .modal h3 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 16px;
  }
  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 20px;
  }

  /* Upload progress */
  .upload-toast {
    display: none;
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--dim);
    border-radius: var(--radius);
    padding: 14px 18px;
    min-width: 280px;
    z-index: 400;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .upload-toast.show { display: block; }
  .upload-toast p { font-size: 13px; margin-bottom: 8px; }
  .upload-bar {
    height: 3px;
    background: var(--dim);
    border-radius: 2px;
    overflow: hidden;
  }
  .upload-bar-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s;
  }

  /* Status bar */
  .statusbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 24px;
    border-top: 1px solid var(--dim);
    flex-shrink: 0;
  }
  .statusbar span {
    font-size: 11px;
    color: var(--muted);
    font-family: 'Geist Mono', monospace;
  }
  .status-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 6px;
  }
  .status-dot.online { background: #4ade80; }
  .status-dot.offline { background: var(--accent); }
</style>
</head>
<body>

<!-- ═══════════════ LOGIN ═══════════════ -->
<div class="login-wrap" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <img src="logo-icon.svg" alt="Claudy">
      <span>claudy.app</span>
    </div>
    <h2>Sign in to your drive</h2>
    <p>Access your files from anywhere</p>
    <div class="login-error" id="loginError"></div>
    <form id="loginForm">
      <div class="field" id="serverField" style="display:none">
        <label>Server URL</label>
        <input type="url" id="serverUrl" placeholder="http://your-server" value="">
      </div>
      <div class="field">
        <label>Username</label>
        <input type="text" id="username" autocomplete="username" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary" id="loginBtn">Sign in</button>
    </form>
    <div class="login-server">
      <a id="toggleServer">Change server</a>
    </div>
  </div>
</div>

<!-- ═══════════════ APP ═══════════════ -->
<div class="app" id="app">
  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-left">
      <img src="logo-icon.svg" alt="Claudy">
      <span>claudy.app</span>
    </div>
    <div class="topbar-right">
      <span class="topbar-user" id="displayUser"></span>
      <button class="btn-icon" id="logoutBtn" title="Sign out">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="toolbar-actions">
      <button class="btn btn-ghost" id="newFolderBtn">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Folder
      </button>
      <button class="btn btn-primary" id="uploadBtn" style="text-transform: uppercase;">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><polyline points="16,16 12,12 8,16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
        Upload
      </button>
      <input type="file" id="fileInput" multiple hidden>
    </div>
  </div>

  <!-- File list -->
  <div class="file-area" id="fileArea">
    <table class="file-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Size</th>
          <th>Modified</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="fileList"></tbody>
    </table>
  </div>

  <!-- Status bar -->
  <div class="statusbar">
    <span id="statusInfo"></span>
    <span><span class="status-dot" id="statusDot"></span><span id="statusText"></span></span>
  </div>
</div>

<!-- Drop overlay -->
<div class="drop-overlay" id="dropOverlay"><p>Drop files to upload</p></div>

<!-- Context menu -->
<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item" data-action="open">
    <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
    Open
  </div>
  <div class="ctx-item" data-action="download">
    <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Download
  </div>
  <div class="ctx-item" data-action="rename">
    <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
    Rename
  </div>
  <div class="ctx-sep"></div>
  <div class="ctx-item danger" data-action="delete">
    <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><polyline points="3,6 5,6 21,6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
    Delete
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <div class="field">
      <label id="modalLabel"></label>
      <input type="text" id="modalInput">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="modalCancel">Cancel</button>
      <button class="btn btn-primary" id="modalOk" style="width:auto">OK</button>
    </div>
  </div>
</div>

<!-- Upload toast -->
<div class="upload-toast" id="uploadToast">
  <p id="uploadText">Uploading...</p>
  <div class="upload-bar"><div class="upload-bar-fill" id="uploadBar"></div></div>
</div>

<script>
// ─────────────────────────────────────────────
// Config & state
// ─────────────────────────────────────────────
// Determine default API endpoint.
// file:// → location.origin is "null", so show server field and let user enter URL.
// localhost → relay runs on :9090
// any other host → same origin (relay serves static files too)
const _isFile = location.protocol === 'file:';
const _isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
let API = _isFile ? ''
  : _isLocal ? location.protocol + '//' + location.hostname + ':9090'
  : location.origin;
let creds = null;          // { username, password }
let currentPath = '/';     // relative to user root

const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

// ─────────────────────────────────────────────
// Auth helpers
// ─────────────────────────────────────────────
function authHeader() {
  return 'Basic ' + btoa(creds.username + ':' + creds.password);
}

function davBase() {
  return API + '/dav/' + creds.username;
}

// ─────────────────────────────────────────────
// Login
// ─────────────────────────────────────────────
$('#toggleServer').addEventListener('click', () => {
  const f = $('#serverField');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
});

$('#loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = $('#loginBtn');
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  $('#loginError').style.display = 'none';

  const server = $('#serverUrl').value.replace(/\/+$/, '');
  if (server) API = server;
  if (!API) {
    $('#loginError').textContent = 'Please enter the server URL';
    $('#loginError').style.display = 'block';
    btn.disabled = false; btn.textContent = 'Sign in';
    return;
  }

  const username = $('#username').value.trim();
  const password = $('#password').value;

  try {
    const r = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    if (!r.ok) {
      const d = await r.json().catch(() => ({}));
      throw new Error(d.error || 'Invalid credentials');
    }
    creds = { username, password };
    sessionStorage.setItem('claudy_creds', JSON.stringify(creds));
    sessionStorage.setItem('claudy_api', API);
    enterApp();
  } catch (err) {
    $('#loginError').textContent = err.message;
    $('#loginError').style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
});

// If opened as file://, always show server field so user can enter relay URL.
if (_isFile) {
  const sf = $('#serverField');
  sf.style.display = 'block';
  const savedApi = sessionStorage.getItem('claudy_api');
  if (savedApi) $('#serverUrl').value = savedApi;
}

// Auto-login from session
(function checkSession() {
  const saved = sessionStorage.getItem('claudy_creds');
  const savedApi = sessionStorage.getItem('claudy_api');
  if (saved) {
    creds = JSON.parse(saved);
    if (savedApi) API = savedApi;
    enterApp();
  }
})();

function enterApp() {
  $('#loginScreen').style.display = 'none';
  $('#app').style.display = 'flex';
  $('#displayUser').textContent = creds.username;
  currentPath = '/';
  loadFiles();
  checkHealth();
}

$('#logoutBtn').addEventListener('click', () => {
  creds = null;
  sessionStorage.removeItem('claudy_creds');
  sessionStorage.removeItem('claudy_api');
  $('#loginScreen').style.display = '';
  $('#app').style.display = 'none';
  $('#password').value = '';
});

// ─────────────────────────────────────────────
// WebDAV helpers
// ─────────────────────────────────────────────
async function davRequest(method, path, opts = {}) {
  const url = davBase() + path;
  const headers = { 'Authorization': authHeader(), ...opts.headers };
  const r = await fetch(url, { method, headers, body: opts.body });
  return r;
}

function parseMultistatus(xml) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xml, 'text/xml');
  const responses = doc.querySelectorAll('response');
  const items = [];

  responses.forEach(resp => {
    const href = resp.querySelector('href')?.textContent || '';
    const isCollection = resp.querySelector('collection') !== null;
    const size = resp.querySelector('getcontentlength')?.textContent || '';
    const modified = resp.querySelector('getlastmodified')?.textContent || '';
    const displayname = resp.querySelector('displayname')?.textContent || '';

    // Decode the href to get the file name
    let decodedHref = decodeURIComponent(href);
    // Strip the /dav/username prefix
    const prefix = '/dav/' + creds.username;
    if (decodedHref.startsWith(prefix)) {
      decodedHref = decodedHref.slice(prefix.length) || '/';
    }

    items.push({
      href: decodedHref,
      name: displayname || decodedHref.replace(/\/$/, '').split('/').pop() || '',
      isDir: isCollection,
      size: size ? parseInt(size) : 0,
      modified: modified ? new Date(modified) : null,
    });
  });

  return items;
}

// ─────────────────────────────────────────────
// Load files
// ─────────────────────────────────────────────
async function loadFiles() {
  try {
    const r = await davRequest('PROPFIND', currentPath, {
      headers: { 'Depth': '1', 'Content-Type': 'text/xml; charset=utf-8' },
      body: '<?xml version="1.0" encoding="utf-8"?><D:propfind xmlns:D="DAV:"><D:allprop/></D:propfind>'
    });
    if (r.status === 401) {
      $('#logoutBtn').click();
      return;
    }
    const xml = await r.text();
    const all = parseMultistatus(xml);

    // Filter: skip the directory itself, skip ._ and .DS_Store files
    const currentNorm = currentPath.replace(/\/$/, '') || '/';
    const files = all.filter(f => {
      const norm = f.href.replace(/\/$/, '') || '/';
      if (norm === currentNorm) return false;
      if (f.name.startsWith('._') || f.name === '.DS_Store') return false;
      return true;
    });

    // Sort: folders first, then alphabetical
    files.sort((a, b) => {
      if (a.isDir && !b.isDir) return -1;
      if (!a.isDir && b.isDir) return 1;
      return a.name.localeCompare(b.name);
    });

    renderFiles(files);
    renderBreadcrumb();
    updateStatus(files);
  } catch (err) {
    console.error('loadFiles error:', err);
  }
}

// ─────────────────────────────────────────────
// Render
// ─────────────────────────────────────────────
const folderSvg = '<svg class="file-icon folder" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>';
const fileSvg = '<svg class="file-icon" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>';

function renderFiles(files) {
  const tbody = $('#fileList');
  if (files.length === 0) {
    tbody.innerHTML = `<tr><td colspan="4">
      <div class="empty-state">
        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        <p>This folder is empty. Drop files or click Upload.</p>
      </div>
    </td></tr>`;
    return;
  }

  tbody.innerHTML = files.map(f => `
    <tr data-href="${escHtml(f.href)}" data-name="${escHtml(f.name)}" data-dir="${f.isDir}">
      <td><div class="file-name">${f.isDir ? folderSvg : fileSvg}<span>${escHtml(f.name)}</span></div></td>
      <td class="col-size">${f.isDir ? '--' : formatSize(f.size)}</td>
      <td class="col-date">${f.modified ? formatDate(f.modified) : ''}</td>
      <td>
        <button class="btn-icon row-menu" title="Actions">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
        </button>
      </td>
    </tr>
  `).join('');

  // Double-click to open
  tbody.querySelectorAll('tr').forEach(tr => {
    tr.addEventListener('dblclick', () => onOpen(tr));
    tr.addEventListener('contextmenu', e => onContext(e, tr));
  });

  // Three-dot menu
  tbody.querySelectorAll('.row-menu').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const tr = btn.closest('tr');
      onContext(e, tr);
    });
  });
}

function renderBreadcrumb() {
  const bc = $('#breadcrumb');
  const parts = currentPath.split('/').filter(Boolean);
  let html = `<a data-path="/">Home</a>`;
  let accum = '/';
  for (const p of parts) {
    accum += p + '/';
    html += `<span class="sep">/</span>`;
    if (accum === currentPath) {
      html += `<span class="current">${escHtml(decodeURIComponent(p))}</span>`;
    } else {
      html += `<a data-path="${escHtml(accum)}">${escHtml(decodeURIComponent(p))}</a>`;
    }
  }
  bc.innerHTML = html;
  bc.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', () => {
      currentPath = a.dataset.path;
      loadFiles();
    });
  });
}

function updateStatus(files) {
  const dirs = files.filter(f => f.isDir).length;
  const fils = files.filter(f => !f.isDir).length;
  const total = files.filter(f => !f.isDir).reduce((s, f) => s + f.size, 0);
  let info = '';
  if (dirs) info += `${dirs} folder${dirs > 1 ? 's' : ''}`;
  if (dirs && fils) info += ', ';
  if (fils) info += `${fils} file${fils > 1 ? 's' : ''} (${formatSize(total)})`;
  if (!dirs && !fils) info = 'Empty folder';
  $('#statusInfo').textContent = info;
}

async function checkHealth() {
  try {
    const r = await fetch(API + '/health');
    const d = await r.json();
    const online = d.tunnels > 0;
    $('#statusDot').className = 'status-dot ' + (online ? 'online' : 'offline');
    $('#statusText').textContent = online ? 'Source online' : 'Source offline';
  } catch {
    $('#statusDot').className = 'status-dot offline';
    $('#statusText').textContent = 'Server unreachable';
  }
}
setInterval(checkHealth, 15000);

// ─────────────────────────────────────────────
// Actions
// ─────────────────────────────────────────────
function onOpen(tr) {
  const href = tr.dataset.href;
  const isDir = tr.dataset.dir === 'true';
  if (isDir) {
    currentPath = href.endsWith('/') ? href : href + '/';
    loadFiles();
  } else {
    downloadFile(href, tr.dataset.name);
  }
}

async function downloadFile(href, name) {
  try {
    const r = await davRequest('GET', href);
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 10000); // Safari needs time before revoke
  } catch (err) {
    alert('Download failed: ' + err.message);
  }
}

// Upload
$('#uploadBtn').addEventListener('click', () => $('#fileInput').click());
$('#fileInput').addEventListener('change', () => {
  uploadFiles($('#fileInput').files);
  $('#fileInput').value = '';
});

// Recursively collect all File objects from a FileSystemEntry
async function collectEntries(entry, basePath) {
  if (entry.isFile) {
    return new Promise(resolve => {
      entry.file(file => resolve([{ file, path: basePath + encodeURIComponent(file.name) }]));
    });
  }
  // Directory: create folder first, then recurse
  const dirPath = basePath + encodeURIComponent(entry.name) + '/';
  await davRequest('MKCOL', dirPath);
  const reader = entry.createReader();
  const all = [];
  // readEntries may return in batches — loop until empty
  await new Promise(resolve => {
    function readBatch() {
      reader.readEntries(async batch => {
        if (!batch.length) return resolve();
        for (const child of batch) {
          const sub = await collectEntries(child, dirPath);
          all.push(...sub);
        }
        readBatch();
      });
    }
    readBatch();
  });
  return all;
}

// Called from file input (plain FileList)
async function uploadFiles(fileList) {
  const entries = Array.from(fileList).map(f => ({
    isFile: true, isDirectory: false, name: f.name, _file: f
  }));
  uploadFromEntries(entries);
}

// Called from drop (pre-collected FileSystemEntry objects)
async function uploadFromEntries(entries) {
  const toast = $('#uploadToast');
  const bar = $('#uploadBar');
  const text = $('#uploadText');
  toast.classList.add('show');
  bar.style.width = '0%';
  text.textContent = 'Preparing…';

  // Async phase: traverse entries into flat { file, path } list
  const uploads = [];
  console.log('[upload] entries:', entries.length, entries.map(e => e.name || e._file?.name));
  for (const entry of entries) {
    if (entry._file) {
      const path = currentPath + encodeURIComponent(entry.name);
      console.log('[upload] plain file:', path);
      uploads.push({ file: entry._file, path });
    } else {
      console.log('[upload] collecting entry:', entry.name, 'isDir:', entry.isDirectory);
      const sub = await collectEntries(entry, currentPath);
      console.log('[upload] collected:', sub.length, 'files from', entry.name);
      uploads.push(...sub);
    }
  }
  console.log('[upload] total uploads:', uploads.length);

  for (let i = 0; i < uploads.length; i++) {
    const { file, path } = uploads[i];
    text.textContent = `Uploading ${file.name} (${i + 1}/${uploads.length})`;
    bar.style.width = Math.round(((i + 1) / uploads.length) * 100) + '%';
    const r = await davRequest('PUT', path, { body: file });
    console.log('[upload] PUT', path, '→', r.status);
  }

  text.textContent = 'Done';
  setTimeout(() => toast.classList.remove('show'), 1500);
  loadFiles();
}

// Drag & drop
let dragCounter = 0;
document.addEventListener('dragenter', e => {
  e.preventDefault();
  dragCounter++;
  if (creds) $('#dropOverlay').classList.add('active');
});
document.addEventListener('dragleave', e => {
  e.preventDefault();
  dragCounter--;
  if (dragCounter <= 0) {
    dragCounter = 0;
    $('#dropOverlay').classList.remove('active');
  }
});
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  dragCounter = 0;
  $('#dropOverlay').classList.remove('active');
  if (!creds) return;

  // Collect FileSystemEntry objects SYNCHRONOUSLY — DataTransfer is invalidated after first await
  const entries = [];
  if (e.dataTransfer.items) {
    for (const item of e.dataTransfer.items) {
      const entry = item.webkitGetAsEntry ? item.webkitGetAsEntry() : null;
      if (entry) entries.push(entry);
      else {
        const f = item.getAsFile();
        if (f) entries.push({ isFile: true, isDirectory: false, name: f.name, _file: f });
      }
    }
  } else {
    for (const f of e.dataTransfer.files) {
      entries.push({ isFile: true, isDirectory: false, name: f.name, _file: f });
    }
  }
  uploadFromEntries(entries);
});

// New folder
$('#newFolderBtn').addEventListener('click', () => {
  showModal('New folder', 'Folder name', 'Untitled folder', async name => {
    if (!name) return;
    const path = currentPath + encodeURIComponent(name) + '/';
    await davRequest('MKCOL', path);
    loadFiles();
  });
});

// Context menu
let ctxTarget = null;

function onContext(e, tr) {
  e.preventDefault();
  ctxTarget = tr;
  const menu = $('#ctxMenu');
  const isDir = tr.dataset.dir === 'true';
  menu.querySelector('[data-action="open"]').textContent = isDir ? 'Open' : 'Open';
  menu.querySelector('[data-action="download"]').style.display = isDir ? 'none' : '';

  // Position
  menu.style.left = Math.min(e.clientX, window.innerWidth - 180) + 'px';
  menu.style.top = Math.min(e.clientY, window.innerHeight - 200) + 'px';
  menu.classList.add('show');
}

document.addEventListener('click', () => $('#ctxMenu').classList.remove('show'));

$$('.ctx-item').forEach(item => {
  item.addEventListener('click', async () => {
    if (!ctxTarget) return;
    const action = item.dataset.action;
    const href = ctxTarget.dataset.href;
    const name = ctxTarget.dataset.name;
    const isDir = ctxTarget.dataset.dir === 'true';

    if (action === 'open') {
      onOpen(ctxTarget);
    } else if (action === 'download') {
      downloadFile(href, name);
    } else if (action === 'rename') {
      showModal('Rename', 'New name', name, async newName => {
        if (!newName || newName === name) return;
        const from = davBase() + href;
        const toPath = currentPath + encodeURIComponent(newName) + (isDir ? '/' : '');
        const to = davBase() + toPath;
        await davRequest('MOVE', href, {
          headers: { 'Destination': to, 'Overwrite': 'F' }
        });
        loadFiles();
      });
    } else if (action === 'delete') {
      if (confirm(`Delete "${name}"?`)) {
        await davRequest('DELETE', href);
        loadFiles();
      }
    }
  });
});

// Modal
function showModal(title, label, defaultVal, onOk) {
  $('#modalTitle').textContent = title;
  $('#modalLabel').textContent = label;
  const input = $('#modalInput');
  input.value = defaultVal;
  $('#modalOverlay').classList.add('show');
  setTimeout(() => { input.focus(); input.select(); }, 50);

  const cleanup = () => $('#modalOverlay').classList.remove('show');

  $('#modalCancel').onclick = cleanup;
  $('#modalOk').onclick = () => { cleanup(); onOk(input.value.trim()); };
  input.onkeydown = e => {
    if (e.key === 'Enter') { cleanup(); onOk(input.value.trim()); }
    if (e.key === 'Escape') cleanup();
  };
}

// ─────────────────────────────────────────────
// Utilities
// ─────────────────────────────────────────────
function formatSize(bytes) {
  if (bytes === 0) return '0 B';
  const k = 1024;
  const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
  const i = Math.floor(Math.log(bytes) / Math.log(k));
  return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
}

function formatDate(d) {
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'Just now';
  if (diff < 3600000) return Math.floor(diff / 60000) + ' min ago';
  if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
  if (d.getFullYear() === now.getFullYear()) {
    return d.toLocaleDateString('en', { month: 'short', day: 'numeric' });
  }
  return d.toLocaleDateString('en', { year: 'numeric', month: 'short', day: 'numeric' });
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
