<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claudy — Logo</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f0f0f;
    min-height: 100vh;
    display: grid;
    place-items: center;
  }

  .v2-box {
    width: 88px;
    height: 88px;
    background: #e8474a;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .v2-word {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: #555;
    font-family: 'Geist Mono', monospace;
    margin-top: 16px;
    text-align: center;
  }
</style>
</head>
<body>
  <div style="display:flex;flex-direction:column;align-items:center;">
    <div class="v2-box">
      <svg width="72" height="64" viewBox="3 10 34 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="10" y="22" width="20" height="10" fill="white"/>
        <rect x="14" y="16" width="12" height="8" fill="white"/>
        <rect x="18" y="12" width="8"  height="6" fill="white"/>
        <rect x="6"  y="22" width="6"  height="6"  fill="white"/>
        <rect x="28" y="20" width="6"  height="8"  fill="white"/>
        <rect x="10" y="23" width="7" height="5" fill="none" stroke="#c03a3a" stroke-width="0.9"/>
        <rect x="21" y="23" width="7" height="5" fill="none" stroke="#c03a3a" stroke-width="0.9"/>
        <line x1="17" y1="25.5" x2="21" y2="25.5" stroke="#c03a3a" stroke-width="0.9"/>
        <line x1="10" y1="25.5" x2="8"  y2="25.5" stroke="#c03a3a" stroke-width="0.9"/>
        <line x1="28" y1="25.5" x2="30" y2="25.5" stroke="#c03a3a" stroke-width="0.9"/>
      </svg>
    </div>
    <div class="v2-word">claudy.app</div>
  </div>
</body>
</html>
